<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>الكيمياء التطبيقية الصناعية - جامعة الزقازيق</title>
    <meta name="description"
          content="البوابة الإلكترونية لطلاب قسم الكيمياء التطبيقية الصناعية - كلية العلوم جامعة الزقازيق. روابط الخدمات الطلابية، النتائج، وحساب المعدل." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://alial-3rian.github.io/Applied-Chemistry/" />
    <meta property="og:title"       content="الكيمياء التطبيقية الصناعية" />
    <meta property="og:description" content="روابط الخدمات الطلابية وحساب المعدل التراكمي لطلاب علوم الزقازيق." />
    <meta property="og:image"       content="https://alial-3rian.github.io/Applied-Chemistry/AIC-Links/assets/logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="الكيمياء التطبيقية الصناعية" />
    <meta name="twitter:description" content="روابط الخدمات الطلابية وحساب المعدل التراكمي لطلاب علوم الزقازيق." />
    <meta name="twitter:image"       content="https://alial-3rian.github.io/Applied-Chemistry/AIC-Links/assets/logo.png" />

    <link rel="icon" href="./assets/logo.png" />

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Styles -->
    <link rel="stylesheet" href="./css/theme.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
</head>

<body class="light-mode">

<!-- ══════════════════════════════
     HEADER
══════════════════════════════ -->
<header>
    <div class="header-container">
        <img src="./assets/logo.png" alt="شعار الكيمياء التطبيقية" class="header-logo"
             onerror="this.style.display='none'" />

        <div class="header-actions">
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="icon-button" aria-label="تبديل الوضع">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>

            <!-- Language -->
            <div class="language-dropdown">
                <button id="language-button" class="icon-button" aria-label="تغيير اللغة">
                    <i class="fas fa-globe"></i> العربية
                </button>
                <div class="dropdown-menu">
                    <button id="arabic-btn">🇸🇦 العربية</button>
                    <button id="english-btn">🇬🇧 English</button>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- ══════════════════════════════
     MAIN
══════════════════════════════ -->
<main class="container">

    <!-- Hero -->
    <section class="intro">
        <div class="box-logo">
            <img src="./assets/logo.png" alt="شعار القسم"
                 onerror="this.style.display='none'" />
        </div>
        <h1 data-translate="title">الكيمياء التطبيقية الصناعية</h1>
        <p data-translate="description">كلية العلوم - جامعة الزقازيق</p>
    </section>

    <!-- Service Cards (مُعبأة بـ JS) -->
    <section class="cards" id="cards-container" aria-label="الخدمات الطلابية">
        <!-- يتم إنشاؤها ديناميكياً بواسطة cards.js -->
    </section>

</main>

<!-- ══════════════════════════════
     FOOTER
══════════════════════════════ -->
<footer>
    <p>
        &copy; 2021–2026 جميع الحقوق محفوظة ·
        <a href="https://www.facebook.com/alial3rian" target="_blank" rel="noopener">Ali Al-3rian</a>
    </p>
</footer>

<!-- ══════════════════════════════
     SCRIPTS (بالترتيب)
══════════════════════════════ -->
<script src="./js/config.js"></script>
<script src="./js/theme.js"></script>
<script src="./js/share.js"></script>
<script src="./js/cards.js"></script>
<script src="./js/language.js"></script>
<script>
    // Bootstrap
    document.addEventListener('DOMContentLoaded', () => {
        Theme.init();
        Language.init();   // يستدعي Cards.render() تلقائياً
    });
</script>

</body>
</html>
